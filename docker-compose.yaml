# Local dev docker-compose for Tribe Agent Desktop.
# A single-container workspace: XFCE desktop + Hermes + PTY server.
#
# Usage:
#   docker compose up --build
#   Desktop:  http://localhost:3001
#   Terminal: ws://localhost:8082  (xterm.js)
#   Hermes:   http://localhost:8081/exec  (shell command API)
#
# For corporate/team use with Clerk auth, see coolify-compose.yaml.

services:
  webtop:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_HERMES: "true"
        HERMES_REF: ${HERMES_REF:-v2026.4.13}
        EXTRA_PACKAGES: ${EXTRA_PACKAGES:-}
        REMOVE_PACKAGES: ${REMOVE_PACKAGES:-}
        INCLUDE_CHROMIUM: ${INCLUDE_CHROMIUM:-true}
    restart: unless-stopped
    ports:
      - "3001:3001"   # Selkies desktop (HTTPS)
      - "8081:8081"   # PTY server HTTP API
      - "8082:8082"   # PTY server WebSocket
    volumes:
      - webtop-config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=027
      - TZ=${TZ:-Etc/UTC}
      - TITLE=${TITLE:-Tribe Workspace}
      - ENTERPRISE_FULLNAME=${ENTERPRISE_FULLNAME:-}
      - ENTERPRISE_GROUPS=${ENTERPRISE_GROUPS:-}
      - ENTERPRISE_SUDO=false
      - HARDEN_DESKTOP=${HARDEN_DESKTOP:-true}
      - DISABLE_SUDO=${DISABLE_SUDO:-true}
      - DISABLE_OPEN_TOOLS=${DISABLE_OPEN_TOOLS:-true}
      - PTY_PORT=8081
      - PTY_CWD=/config/workspace
    shm_size: 1gb
    security_opt:
      - seccomp=unconfined
    stop_signal: SIGRTMIN+3
    stop_grace_period: 30s

volumes:
  webtop-config:
