# Coolify deployment for docker-webtop-tribe.
#
# How to use:
#   1. In Coolify: New Resource -> Docker Compose Empty -> Public Repository
#      Repo URL:       https://github.com/mdcnick/docker-webtop-tribe
#      Branch:         master
#      Compose file:   coolify-compose.yaml
#   2. Coolify parses this file and surfaces the env vars in the UI.
#      Fill them in — at minimum CLERK_PUBLISHABLE_KEY and CLERK_SECRET_KEY.
#   3. Under "Domains for auth-gate" put your public hostname.
#      Leave "Domains for webtop" completely empty. webtop is internal-only.
#   4. Save -> Reload Compose File -> Redeploy.
#
# Isolation model:
#   - webtop runs on a PRIVATE network only. Coolify's reverse proxy
#     cannot reach it even if someone tries to add a domain to it.
#   - auth-gate runs on BOTH the private network (to reach webtop) and
#     the default Coolify network (so the proxy can reach auth-gate).
#   - Explicit Traefik labels pin routing to auth-gate:8080, bypassing
#     Coolify's magic-var heuristics entirely.

services:
  auth-gate:
    build:
      context: ./auth-gate
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - webtop
    networks:
      - default        # Coolify's shared proxy network
      - private        # to reach webtop
    environment:
      # SERVICE_FQDN_AUTHGATE_8080 tells Coolify to populate the label
      # expansion below with whatever domain you assign to this service.
      - SERVICE_FQDN_AUTHGATE_8080
      - PORT=8080
      - UPSTREAM=http://webtop:3001
      - FORCE_HTTPS=true
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - ALLOWED_EMAILS=${ALLOWED_EMAILS:-}
      - ALLOWED_USER_IDS=${ALLOWED_USER_IDS:-}
    labels:
      # Explicit Traefik labels — leave nothing to chance. Coolify keeps
      # these and layers its own certresolver + entrypoints on top.
      - "traefik.enable=true"
      - "traefik.http.routers.authgate.rule=Host(`${SERVICE_FQDN_AUTHGATE_8080}`)"
      - "traefik.http.routers.authgate.entrypoints=https"
      - "traefik.http.routers.authgate.tls=true"
      - "traefik.http.routers.authgate.tls.certresolver=letsencrypt"
      - "traefik.http.services.authgate.loadbalancer.server.port=8080"

  webtop:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_HERMES: "true"
        HERMES_REF: "v2026.4.13"
    restart: unless-stopped
    networks:
      - private        # private-only, NOT on Coolify's proxy network
    labels:
      # Hard opt-out from any reverse proxy. Defense in depth on top of
      # the network isolation above.
      - "traefik.enable=false"
    volumes:
      - webtop-config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=027
      - TZ=${TZ:-Etc/UTC}
      - ENTERPRISE_FULLNAME=${ENTERPRISE_FULLNAME:-}
      - ENTERPRISE_GROUPS=${ENTERPRISE_GROUPS:-}
    shm_size: 1gb
    security_opt:
      - seccomp=unconfined
    stop_signal: SIGRTMIN+3
    stop_grace_period: 30s

networks:
  private:
    driver: bridge

volumes:
  webtop-config:
