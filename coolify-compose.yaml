# Coolify deployment for docker-webtop-tribe.
#
# How to use:
#   1. In Coolify: New Resource -> Docker Compose Empty -> Public Repository
#      Repo URL:       https://github.com/mdcnick/docker-webtop-tribe
#      Branch:         master
#      Compose file:   coolify.compose.yaml
#   2. Coolify parses this file and surfaces the env vars in the UI.
#      Fill them in — at minimum CLERK_PUBLISHABLE_KEY and CLERK_SECRET_KEY.
#      The SERVICE_FQDN_AUTHGATE_8080 variable is auto-generated by
#      Coolify from the domain you assign to the service.
#   3. Click Deploy. Coolify builds both images, wires Traefik to the
#      auth-gate service, terminates TLS at its own ingress, and starts
#      the stack.
#
# Why this file is different from examples/deploy/compose.yml:
#   - No Caddy service. Coolify's built-in Traefik is the TLS terminator.
#   - No ports: published. Coolify routes to the service based on the
#     SERVICE_FQDN_* magic variable (see auth-gate.environment below).
#   - Images are built from source via `build:` — Coolify handles the
#     registry push itself.
#
# Security notes:
#   - webtop is only reachable from inside the compose network. Only
#     auth-gate is exposed through Coolify's proxy, and every request
#     goes through Clerk session verification first.
#   - FORCE_HTTPS is on because Coolify's Traefik sets X-Forwarded-Proto.
#   - ALLOWED_EMAILS must be set in the Coolify UI or any signed-in
#     Clerk user in your instance can access the desktop.

services:
  webtop:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_HERMES: "true"
        HERMES_REF: "v2026.4.13"
    restart: unless-stopped
    volumes:
      - webtop-config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=027
      - TZ=${TZ:-Etc/UTC}
      - ENTERPRISE_FULLNAME=${ENTERPRISE_FULLNAME:-}
      - ENTERPRISE_GROUPS=${ENTERPRISE_GROUPS:-}
    shm_size: 1gb
    # chromium sandbox; drop if you built with INCLUDE_CHROMIUM=false
    security_opt:
      - seccomp=unconfined
    stop_signal: SIGRTMIN+3
    stop_grace_period: 30s
    # No ports. webtop is internal-only.

  auth-gate:
    build:
      context: ./auth-gate
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - webtop
    environment:
      # SERVICE_FQDN_AUTHGATE_8080 is Coolify magic: declaring it here
      # tells Coolify to auto-generate Traefik labels routing the domain
      # you assign to this service (port 8080) through to the container.
      # You DO NOT set this in the UI — Coolify injects it from the
      # "Domains for auth-gate" field.
      - SERVICE_FQDN_AUTHGATE_8080
      - PORT=8080
      - UPSTREAM=http://webtop:3001
      - FORCE_HTTPS=true
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      # Comma-separated allow-list. Leave empty to allow any signed-in
      # Clerk user. STRONGLY RECOMMENDED to restrict.
      - ALLOWED_EMAILS=${ALLOWED_EMAILS:-}
      - ALLOWED_USER_IDS=${ALLOWED_USER_IDS:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  webtop-config:
