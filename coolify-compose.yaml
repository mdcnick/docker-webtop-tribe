# Coolify deployment for docker-webtop-tribe.
#
# How to use:
#   1. In Coolify: New Resource -> Docker Compose Empty -> Public Repository
#      Repo URL:       https://github.com/mdcnick/docker-webtop-tribe
#      Branch:         master
#      Compose file:   coolify-compose.yaml
#   2. Coolify parses this file and surfaces the env vars in the UI.
#      Fill them in — at minimum CLERK_PUBLISHABLE_KEY and CLERK_SECRET_KEY.
#   3. Under "Domains for auth-gate" put your public hostname.
#      Leave "Domains for webtop" completely empty. webtop is internal-only.
#   4. Deploy.
#
# Why auth-gate is listed first:
#   Coolify uses the first service in the compose file as the "primary"
#   for domain routing heuristics. Putting auth-gate first removes any
#   ambiguity. webtop is explicitly opted out of Traefik via labels.

services:
  auth-gate:
    build:
      context: ./auth-gate
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - webtop
    environment:
      # SERVICE_FQDN_AUTHGATE_8080 is Coolify magic: declaring it here
      # tells Coolify to auto-generate Traefik labels routing the domain
      # assigned to this service through to port 8080 in the container.
      - SERVICE_FQDN_AUTHGATE_8080
      - PORT=8080
      - UPSTREAM=http://webtop:3001
      - FORCE_HTTPS=true
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      # Comma-separated allow-list. Leave empty to allow any signed-in
      # Clerk user. STRONGLY RECOMMENDED to restrict.
      - ALLOWED_EMAILS=${ALLOWED_EMAILS:-}
      - ALLOWED_USER_IDS=${ALLOWED_USER_IDS:-}
    # No healthcheck: bun:1-alpine doesn't ship wget/curl reliably, and
    # a failing healthcheck makes Traefik stop routing here, which in
    # Coolify causes it to fall back to a different service that IS
    # healthy — in this stack that's webtop's nginx, which is the exact
    # bug we're avoiding. If you want a healthcheck, add one that uses
    # `bun` itself to probe /healthz.

  webtop:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_HERMES: "true"
        HERMES_REF: "v2026.4.13"
    restart: unless-stopped
    # Explicitly disable Traefik for webtop. Even if a user fills in a
    # domain in the Coolify UI by mistake, Traefik will refuse to route
    # to this service. webtop is only reachable from inside the compose
    # network via auth-gate.
    labels:
      - "traefik.enable=false"
      - "coolify.managed=true"
    volumes:
      - webtop-config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=027
      - TZ=${TZ:-Etc/UTC}
      - ENTERPRISE_FULLNAME=${ENTERPRISE_FULLNAME:-}
      - ENTERPRISE_GROUPS=${ENTERPRISE_GROUPS:-}
    shm_size: 1gb
    security_opt:
      - seccomp=unconfined
    stop_signal: SIGRTMIN+3
    stop_grace_period: 30s

volumes:
  webtop-config:
